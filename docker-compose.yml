version: '3.8'

services:

  app:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: crm_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - crm_network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - crm_network
    depends_on:
      - app

  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm_network

  horizon:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: crm_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./backend:/var/www
    networks:
      - crm_network
    depends_on:
      - app
      - redis

networks:
  crm_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
